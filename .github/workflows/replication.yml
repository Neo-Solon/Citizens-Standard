name: replication

# The browser verifier now covers EVERY package (Paper 10 unblocked via src/hac_ols.py). This
# still runs the full suite against the REAL statsmodels, which stays the source of truth.
# The browser fallback is verified against it, not trusted in place of it.

on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"      # weekly: catches rot from dependency drift, not just from our edits
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install numpy pandas matplotlib scipy statsmodels sympy networkx

      - name: Run the full replication suite
        working-directory: replication
        run: python run_all.py --report      # non-zero exit if ANY package fails to reproduce

      - name: Upload the verification report
        if: always()                          # publish it even when a package fails — especially then
        uses: actions/upload-artifact@v4
        with:
          name: replication-report
          path: replication/report/
          retention-days: 90
