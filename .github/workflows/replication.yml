name: replication

# The browser verifier on methodology.html covers 9 of the 12 packages. The other two need the
# 22 MB SCF microdata and statsmodels/scipy, which are unreasonable to pull into a browser tab.
# This runs the FULL suite — all 12 — so nothing is verified only by the packages that happen to
# be convenient.
on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"      # weekly: catches rot from dependency drift, not just from our edits
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install numpy pandas matplotlib scipy statsmodels sympy

      - name: Run the full replication suite
        working-directory: replication
        run: python run_all.py --report      # non-zero exit if ANY package fails to reproduce

      - name: Upload the verification report
        if: always()                          # publish it even when a package fails — especially then
        uses: actions/upload-artifact@v4
        with:
          name: replication-report
          path: replication/report/
          retention-days: 90
